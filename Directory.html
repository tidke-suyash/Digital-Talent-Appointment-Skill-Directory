<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MET Faculty Task Appointment Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --accent: #5C6BC0;
            --danger: #EF5350;
            --success: #66BB6A;
            --text-p: #2C3E50;
            --text-s: #7F8C8D;
            --pastel-blue: #E3F2FD;
            --radius: 14px;
            --card-shadow: rgba(0,0,0,0.03);
            --border: #EEE;
            --search-glow: rgba(92, 107, 192, 0.1);
        }

        [data-theme="dark"] {
            --bg: #121214;
            --surface: #1E1E22;
            --accent: #7986CB;
            --text-p: #E1E1E6;
            --text-s: #A0A0B3;
            --pastel-blue: #282A36;
            --card-shadow: rgba(0,0,0,0.3);
            --border: #2D2D35;
            --search-glow: rgba(121, 134, 203, 0.15);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
        body { background-color: var(--bg); color: var(--text-p); padding: 30px; padding-bottom: 100px; }

        .container { max-width: 1100px; margin: 0 auto; }
        
        .header-panel {
            background: var(--surface); padding: 30px; border-radius: var(--radius);
            box-shadow: 0 4px 20px var(--card-shadow); border: 1px solid var(--border); margin-bottom: 30px;
        }

        .theme-toggle-float {
            position: fixed; bottom: 30px; right: 30px;
            width: 56px; height: 56px; border-radius: 50%; border: none;
            background: var(--accent); color: white;
            cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000;
        }

        .search-container { position: relative; margin-bottom: 40px; }
        .search-box { 
            width: 100%; padding: 18px 25px; border-radius: 16px; 
            border: 2px solid var(--accent); background: var(--surface); 
            color: var(--text-p); font-size: 16px; font-weight: 500;
            box-shadow: 0 8px 30px var(--search-glow); outline: none;
        }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin: 20px 0; }
        input { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-p); width: 100%; }

        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-p { background: var(--accent); color: #FFF; }
        .btn-s { background: var(--pastel-blue); color: var(--accent); }
        .btn-d { background: rgba(239, 83, 80, 0.1); color: var(--danger); }

        .year-section { margin-bottom: 50px; }
        .year-title { font-size: 14px; font-weight: 800; color: var(--text-s); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .year-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); transition: 0.4s ease; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px var(--card-shadow); border-color: var(--accent); }
        .card.hired { border-left: 6px solid var(--success); }
        .card.disabled { opacity: 0.4; filter: grayscale(1); }

        .card-name { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .tag { background: var(--pastel-blue); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; margin: 2px; color: var(--accent); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--surface); width: 90%; max-width: 480px; padding: 40px; border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); position: relative; max-height: 85vh; overflow-y: auto; color: var(--text-p); }
        .modal-action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border); }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1 style="text-align:center; margin-bottom:20px;">MET Instituted of Management's <br> Faculty Task Appointment Console</h1>
        <div class="control-grid">
            <input type="text" id="facName" placeholder="Faculty Member Name" oninput="saveMem()">
            <input type="text" id="taskDesc" placeholder="Task to Assign" oninput="saveMem()">
            <div style="display:flex;">
                <label for="file-input" class="btn btn-s" style="width:100%; text-align:center;">Import Dataset</label>
                <input type="file" id="file-input" accept=".xlsx, .csv">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-p" onclick="promoteWithWarning()">Promote Academic Year</button>
            <button class="btn btn-s" onclick="exportData()">Daily Backup</button>
            <button class="btn btn-d" onclick="deleteAll()">Wipe Data</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" onkeyup="render()" placeholder="Search skills, name, or hobbies...">
    </div>

    <div id="display-area"></div>
</div>

<button class="theme-toggle-float" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="modalData"></div>
        <div class="modal-action-bar" id="modalActions"></div>
    </div>
</div>
 <footer style="
        padding: 15px; 
        text-align: center; 
        border-top: 1px solid #333333;
        width: 100%;
    ">
      <p style="
          margin: 0;
          font-family: 'Orbitron', 'Courier New', Courier, monospace; 
          font-size: 10px; 
          letter-spacing: 2.5px; 
          text-transform: uppercase; 
          opacity: 0.65;
      ">
        Established 2026 // Tidke's Creation // MET IOM NSK
      </p>
    </footer>
<script>
    let students = JSON.parse(localStorage.getItem('acad_data')) || [];
    let currentTheme = localStorage.getItem('theme') || 'light';

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'dark' ? '☀️' : '🌙';
        document.getElementById('facName').value = localStorage.getItem('acad_fac') || "";
        document.getElementById('taskDesc').value = localStorage.getItem('acad_task') || "";
        render();
    };

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'dark' ? '☀️' : '🌙';
    }

    function saveMem() {
        localStorage.setItem('acad_fac', document.getElementById('facName').value);
        localStorage.setItem('acad_task', document.getElementById('taskDesc').value);
    }

    function sync() {
        localStorage.setItem('acad_data', JSON.stringify(students));
        render();
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const workbook = XLSX.read(evt.target.result, { type: 'binary' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            students = json.map((row, idx) => ({
                id: row._uid || Date.now() + idx,
                status: row._status || 'active',
                rawData: row,
                name: row["Add your full name"] || row.name || "Unknown",
                phone: row["Add your contact number"] || row.phone || "",
                section: row["Your Section"] || row.section || "General",
                skills: row["What are your Primary Creative Interests ? "] || row.skills || ""
            }));
            sync();
        };
        reader.readAsBinaryString(file);
    });

    function render() {
        const area = document.getElementById('display-area');
        area.innerHTML = "";
        const query = document.getElementById('searchInput').value.toLowerCase();
        const groups = {};

        students.filter(s => s.status !== 'deleted').forEach(s => {
            if (s.name.toLowerCase().includes(query) || s.skills.toLowerCase().includes(query)) {
                if (!groups[s.section]) groups[s.section] = [];
                groups[s.section].push(s);
            }
        });

        Object.keys(groups).sort().forEach(year => {
            const section = document.createElement('div');
            section.className = 'year-section';
            section.innerHTML = `<div class="year-title">${year}</div><div class="grid"></div>`;
            const grid = section.querySelector('.grid');

            groups[year].forEach(s => {
                const card = document.createElement('div');
                card.className = `card ${s.status}`;
                card.onclick = () => showIDWindow(s.id);
                card.innerHTML = `
                    <div class="card-name">${s.name}</div>
                    <div style="font-size:11px; color:var(--text-s); margin-bottom:12px;">Roll: ${s.rawData["Your Roll no."] || '---'}</div>
                    <div style="display:flex; flex-wrap:wrap;">
                        ${s.skills.split(',').slice(0,2).map(sk => `<span class="tag">${sk.trim()}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
            area.appendChild(section);
        });
    }

    function showIDWindow(id) {
        const s = students.find(x => x.id === id);
        const dataBox = document.getElementById('modalData');
        const actionBox = document.getElementById('modalActions');

        let html = `<h2 style="margin-bottom:25px; letter-spacing:-0.5px;">Student Profile</h2>`;
        for (const [k, v] of Object.entries(s.rawData)) {
            if (!k.startsWith('_')) {
                html += `<div style="margin-bottom:14px;">
                            <p style="font-size:9px; color:var(--text-s); font-weight:800; text-transform:uppercase;">${k}</p>
                            <p style="font-size:14px; line-height:1.4;">${v || '—'}</p>
                         </div>`;
            }
        }
        dataBox.innerHTML = html;

        actionBox.innerHTML = `
            <button class="btn btn-p" onclick="manualHired(${s.id})">${s.status === 'hired' ? 'Active' : 'Mark Hired'}</button>
            <button class="btn btn-d" onclick="deleteStudent(${s.id})">Delete ID</button>
            <button class="btn btn-s" style="grid-column: span 2; padding:15px;" onclick="whatsappDirect(${s.id})">Contact on WhatsApp</button>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function manualHired(id) {
        const s = students.find(x => x.id === id);
        s.status = s.status === 'hired' ? 'active' : 'hired';
        sync(); closeModal();
    }

    function deleteStudent(id) {
        if (confirm("Permanently delete this student record?")) {
            students = students.filter(x => x.id !== id);
            sync(); closeModal();
        }
    }

    function whatsappDirect(id) {
        const s = students.find(x => x.id === id);
        const fac = document.getElementById('facName').value;
        const task = document.getElementById('taskDesc').value;
        if (!fac || !task) return alert("Please fill Faculty Name and Task!");
        
        s.status = 'hired'; 
        sync();

        // New Personalized Message Template
        const msg = `Dear ${s.name} ,

We are pleased to invite you to contribute in ${task}. Your expertise in ${s.skills} would be a valuable addition to the task. If you are interested please meet ${fac}

Best Regards,
${fac}`;

        window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function promoteWithWarning() {
        if (confirm("⚠️ WARNING: Promoting AY will delete Graduated BCA/BBA (Year 4) and MCA/MBA (Year 2). Proceed?")) {
            students = students.filter(s => {
                const sec = s.section;
                const isBCA_BBA = sec.includes("BCA") || sec.includes("BBA");
                const isMCA_MBA = sec.includes("MCA") || sec.includes("MBA");

                if (sec.includes("First Year")) s.section = sec.replace("First Year", "Second Year");
                else if (sec.includes("Second Year")) {
                    if (isMCA_MBA) return false;
                    s.section = sec.replace("Second Year", "Third Year");
                }
                else if (sec.includes("Third Year")) s.section = sec.replace("Third Year", "Fourth Year");
                else if (sec.includes("Fourth Year") && isBCA_BBA) return false;
                return true;
            });
            sync();
        }
    }

    function exportData() {
        const data = students.map(s => {
            const row = {...s.rawData};
            row._status = s.status; row._uid = s.id; row.section = s.section;
            return row;
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Backup");
        XLSX.writeFile(wb, "Symmetry_Library_Backup.xlsx");
    }

    function deleteAll() { if(confirm("ERASE ALL DATA?")) { students = []; localStorage.clear(); sync(); } }
</script>
</body>
</html>
